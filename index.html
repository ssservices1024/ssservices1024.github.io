
<!DOCTYPE html>
<html>
<head>
  <title>SS Microgreens</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    header {
      background: #0b6623;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .section {
      text-align: center;
      padding: 30px;
    }

    .products {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: #fff;
      margin: 10px;
      padding: 15px;
      width: 220px;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }

    .contact {
      background: #eaffea;
      padding: 30px;
    }

    input, select, textarea {
      width: 80%;
      padding: 10px;
      margin: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background: green;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    footer {
      background: #0b6623;
      color: white;
      text-align: center;
      padding: 15px;
    }
  </style>
</head>

<body>

<header>
  <h1>🌱 SS Microgreens</h1>
  <p>Fresh | Organic | Healthy</p>
</header>

<!-- ✅ PRODUCTS -->
<div class="section">
  <h2>Our Products</h2>

  <div class="products">

    <div class="card">
      <h3>🌿 Wheatgrass</h3>
      <p>50g Pack</p>
      <p>₹50</p>
    </div>

    <div class="card">
      <h3>🌻 Sunflower</h3>
      <p>50g Pack</p>
      <p>₹60</p>
    </div>

    <div class="card">
      <h3>🌱 Pea Shoots</h3>
      <p>50g Pack</p>
      <p>₹70</p>
    </div>

  </div>
</div>

<!-- ✅ ORDER FORM -->
<div class="contact">
  <h2>Place Your Order</h2>

  <form onsubmit="sendOrder(); return false;">
    
    <input type="text" id="name" placeholder="Your Name" required><br>

    <select id="product">
      <option value="Wheatgrass (50g)">Wheatgrass (50g)</option>
      <option value="Sunflower (50g)">Sunflower (50g)</option>
      <option value="Pea Shoots (50g)">Pea Shoots (50g)</option>
    </select><br>

    <select id="qty">
      <option value="1 Box">1 Box</option>
      <option value="2 Boxes">2 Boxes</option>
      <option value="3 Boxes">3 Boxes</option>
    </select><br>

    <textarea id="address" placeholder="Enter Delivery Address"></textarea><br>

    <button type="submit">Place Order</button>

  </form>

  <br>

  <p>📞 8105895809</p>
  <p>📧 ssservice1024@gmail.com</p>

</div>

<footer>
  <p>© 2026 SS Microgreens</p>
</footer>

<script>
function sendOrder() {
  var name = document.getElementById("name").value;
  var product = document.getElementById("product").value;
  var qty = document.getElementById("qty").value;
  var address = document.getElementById("address").value;

  var msg = "🌱 New Order:%0A" +
            "Name: " + name + "%0A" +
            "Product: " + product + "%0A" +
            "Quantity: " + qty + "%0A" +
            "Address: " + address;

  window.open("https://wa.me/918105895809?text=" + msg);
}
</script>

</body>
</html>
